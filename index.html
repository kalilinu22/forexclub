<script>
    let c=1100,m=document.getElementById('memberCount'),i=setInterval(()=>{if(c<1247){c+=Math.floor(Math.random()*7)+1;if(c>1247)c=1247;m.innerText=c;}else clearInterval(i);},50);
    let s=15*60,t=document.getElementById('countdown');
    function up(){if(s<=0){t.innerText="00:00";return;}let m=Math.floor(s/60),sc=s%60;t.innerText=`${m.toString().padStart(2,'0')}:${sc.toString().padStart(2,'0')}`;s--;}
    up();setInterval(up,1000);
